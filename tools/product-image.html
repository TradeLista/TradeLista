<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradeLista — logo image</title>
<!--
  Local tool, deliberately NOT inside web/ so it never ships with the site.
  Open this file directly in a browser and click a download button; upload the
  resulting PNG to Stripe (Produktkatalog -> TradeLista Pro -> Bild) or use it
  anywhere else an app icon is needed.

  The mark is redrawn with the Canvas API rather than rasterising the SVG,
  because drawing an SVG onto a canvas taints it in some browsers and
  toDataURL() then throws — this way the download always works.
-->
<style>
  body{background:#0f1219; color:#e7edf5; font-family:system-ui,-apple-system,sans-serif;
       margin:0; padding:40px 20px; text-align:center;}
  h1{font-size:19px; font-weight:600; margin:0 0 6px;}
  .sub{color:#8b96a8; font-size:13px; margin:0 0 32px;}
  .card{display:inline-block; background:#171b24; border:1px solid #262c38;
        border-radius:16px; padding:24px;}
  canvas{width:280px; height:280px; border-radius:14px; display:block;}
  .buttons{display:flex; gap:10px; margin-top:18px;}
  button{flex:1; padding:11px 18px; border:0; border-radius:999px;
         background:#6366f1; color:#fff; font-size:14px; font-weight:600; cursor:pointer;}
  button.alt{background:transparent; border:1px solid #3a4152; color:#c7cddb;}
</style>
</head>
<body>
  <h1>TradeLista logo</h1>
  <p class="sub">Your calendar mark &mdash; no badge, no text. Transparent-free square PNG.</p>

  <div class="card">
    <canvas id="logo" width="1024" height="1024"></canvas>
    <div class="buttons">
      <button data-size="512">Download 512 &times; 512</button>
      <button data-size="1024" class="alt">Download 1024 &times; 1024</button>
    </div>
  </div>

<script>
  // The mark is authored on a 112-unit grid (same as the SVG in the site header),
  // so every coordinate below is that original value scaled by K.
  const WHITE = 'rgba(255,255,255,0.28)', GREEN = '#22c55e', RED = '#ef4444';
  const GRID = [[WHITE, GREEN, WHITE], [RED, WHITE, GREEN], [WHITE, GREEN, RED]];
  const OFFSETS = [16, 44, 72];

  function roundedRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawLogo(ctx, size){
    const K = size / 112;
    ctx.clearRect(0, 0, size, size);
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#000000');
    grad.addColorStop(1, '#8081F8');
    ctx.fillStyle = grad;
    roundedRect(ctx, 0, 0, size, size, 28 * K);
    ctx.fill();

    for(let row = 0; row < 3; row++){
      for(let col = 0; col < 3; col++){
        ctx.fillStyle = GRID[row][col];
        roundedRect(ctx, OFFSETS[col] * K, OFFSETS[row] * K, 24 * K, 24 * K, 6 * K);
        ctx.fill();
      }
    }
  }

  // Preview canvas is 1024 so it stays crisp when scaled down by CSS.
  drawLogo(document.getElementById('logo').getContext('2d'), 1024);

  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const size = Number(btn.dataset.size);
      const out = document.createElement('canvas');
      out.width = out.height = size;
      drawLogo(out.getContext('2d'), size);
      const link = document.createElement('a');
      link.href = out.toDataURL('image/png');
      link.download = 'tradelista-logo-' + size + '.png';
      link.click();
    });
  });
</script>
</body>
</html>
