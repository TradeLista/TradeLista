<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeLista — Log in or create an account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --bg-elevated:#11161f;
    --bg-card:#151b26;
    --bg-hover:#1b2330;
    --border:#232b3a;
    --border-soft:#1a2130;
    --text:#e7edf5;
    --text-dim:#8b96a8;
    --text-faint:#5c6678;
    --green:#1fd18a;
    --green-dim:rgba(31,209,138,0.14);
    --green-border:rgba(31,209,138,0.35);
    --red:#f0475a;
    --red-dim:rgba(240,71,90,0.14);
    --red-border:rgba(240,71,90,0.35);
    --accent:#4f8cff;
    --accent-dim:rgba(79,140,255,0.14);
    --accent2:#8b6cff;
    --radius:14px;
    --radius-sm:9px;
    --font-ui:'Inter',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(79,140,255,0.08), transparent),
      radial-gradient(ellipse 700px 400px at 100% 0%, rgba(139,108,255,0.06), transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--font-ui);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  ::selection{background:var(--accent-dim);}

  .topnav{
    display:flex; align-items:center; justify-content:center;
    padding:20px 32px;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:21px; letter-spacing:-0.02em;}
  .brand-icon{flex-shrink:0; display:block;}
  .brand-trade{color:#f5f5f7;}
  .brand-accent{background:linear-gradient(135deg,#9d9ff5,#6366f1); -webkit-background-clip:text; background-clip:text; color:transparent;}

  .wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:24px;}
  .card{
    width:100%; max-width:420px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
    padding:30px;
  }
  .tabs{display:flex; gap:6px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:99px; padding:4px; margin-bottom:24px;}
  .tabs button{
    flex:1; border:none; background:transparent; color:var(--text-dim); font-size:13.5px; font-weight:700;
    padding:9px 0; border-radius:99px; transition:background .15s, color .15s;
  }
  .tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;}

  h1{font-size:20px; font-weight:800; margin-bottom:4px;}
  .sub{font-size:13px; color:var(--text-dim); margin-bottom:22px;}

  .form-row{margin-bottom:14px;}
  .form-row label{display:block; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;}
  .form-row input{
    width:100%; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm);
    color:var(--text); font-family:inherit; font-size:13.5px; padding:10px 12px; outline:none;
  }
  .form-row input:focus{border-color:var(--accent);}
  .form-row input.invalid{border-color:var(--red);}
  .form-grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .form-error{color:var(--red); font-size:12.5px; margin:-4px 0 14px; min-height:14px;}
  .form-success{color:var(--green); font-size:12.5px; margin:-4px 0 14px; min-height:14px;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 18px; border-radius:99px; font-size:14px; font-weight:600; border:1px solid transparent;
    transition:transform .12s, box-shadow .12s; white-space:nowrap; width:100%;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 8px 24px -8px rgba(79,140,255,0.6);}
  .btn-primary:hover{box-shadow:0 10px 30px -6px rgba(79,140,255,0.75);}
  .btn:disabled{opacity:.6; cursor:default; box-shadow:none;}

  .fine{text-align:center; font-size:12px; color:var(--text-faint); margin-top:18px; line-height:1.6;}
  .fine a{color:var(--accent);}

  .panel{display:none;}
  .panel.active{display:block;}
</style>
</head>
<body>

<div class="topnav">
  <a class="brand" href="index.html">
    <svg class="brand-icon" width="28" height="28" viewBox="0 0 112 112" aria-hidden="true">
      <rect width="112" height="112" rx="28" fill="url(#logoGrad)"/>
      <rect x="16" y="16" width="24" height="24" rx="6" fill="rgba(255,255,255,0.28)"/>
      <rect x="44" y="16" width="24" height="24" rx="6" fill="#22c55e"/>
      <rect x="72" y="16" width="24" height="24" rx="6" fill="rgba(255,255,255,0.28)"/>
      <rect x="16" y="44" width="24" height="24" rx="6" fill="#ef4444"/>
      <rect x="44" y="44" width="24" height="24" rx="6" fill="rgba(255,255,255,0.28)"/>
      <rect x="72" y="44" width="24" height="24" rx="6" fill="#22c55e"/>
      <rect x="16" y="72" width="24" height="24" rx="6" fill="rgba(255,255,255,0.28)"/>
      <rect x="44" y="72" width="24" height="24" rx="6" fill="#22c55e"/>
      <rect x="72" y="72" width="24" height="24" rx="6" fill="#ef4444"/>
      <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#000000"/>
          <stop offset="100%" stop-color="#8081F8"/>
        </linearGradient>
      </defs>
    </svg><span class="brand-word"><span class="brand-trade">Trade</span><span class="brand-accent">Lista</span></span>
  </a>
</div>

<div class="wrap">
  <div class="card">
    <div class="tabs">
      <button type="button" id="tabLogin">Log in</button>
      <button type="button" id="tabSignup">Sign up</button>
    </div>

    <div class="panel" id="panelLogin">
      <h1>Welcome back</h1>
      <p class="sub">Log in to open your calendar.</p>
      <form id="loginForm" novalidate>
        <div class="form-row">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" required>
        </div>
        <div class="form-row">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required>
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary" id="loginSubmit">Log in</button>
      </form>
    </div>

    <div class="panel" id="panelSignup">
      <h1>Create your account</h1>
      <p class="sub">Free to start — no card required.</p>
      <form id="signupForm" novalidate>
        <div class="form-grid-2">
          <div class="form-row">
            <label for="suFirstName">First name</label>
            <input type="text" id="suFirstName" autocomplete="given-name" required>
          </div>
          <div class="form-row">
            <label for="suLastName">Last name</label>
            <input type="text" id="suLastName" autocomplete="family-name" required>
          </div>
        </div>
        <div class="form-row">
          <label for="suEmail">Email</label>
          <input type="email" id="suEmail" autocomplete="email" required>
        </div>
        <div class="form-row">
          <label for="suPassword">Password <span style="text-transform:none; color:var(--text-faint);">(min. 8 characters)</span></label>
          <input type="password" id="suPassword" autocomplete="new-password" required minlength="8">
        </div>
        <div class="form-error" id="signupError"></div>
        <button type="submit" class="btn btn-primary" id="signupSubmit">Create free account</button>
      </form>
    </div>

    <p class="fine">By continuing you agree this is a demo account stored only in your browser.</p>
  </div>
</div>

<script src="auth.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect') || 'app.html';

  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const panelLogin = document.getElementById('panelLogin');
  const panelSignup = document.getElementById('panelSignup');

  function showTab(mode){
    const isLogin = mode !== 'signup';
    tabLogin.classList.toggle('active', isLogin);
    tabSignup.classList.toggle('active', !isLogin);
    panelLogin.classList.toggle('active', isLogin);
    panelSignup.classList.toggle('active', !isLogin);
  }
  tabLogin.onclick = () => showTab('login');
  tabSignup.onclick = () => showTab('signup');
  showTab(params.get('mode'));

  if(TLAuth.isLoggedIn()){
    location.replace(redirect);
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginSubmit');
    errEl.textContent = '';
    btn.disabled = true;
    const res = await TLAuth.login({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    });
    btn.disabled = false;
    if(!res.ok){ errEl.textContent = res.error; return; }
    location.href = redirect;
  });

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('signupError');
    const btn = document.getElementById('signupSubmit');
    errEl.textContent = '';
    btn.disabled = true;
    const res = await TLAuth.signup({
      firstName: document.getElementById('suFirstName').value,
      lastName: document.getElementById('suLastName').value,
      email: document.getElementById('suEmail').value,
      password: document.getElementById('suPassword').value
    });
    btn.disabled = false;
    if(!res.ok){ errEl.textContent = res.error; return; }
    location.href = redirect;
  });
</script>
</body>
</html>
